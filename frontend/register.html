<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transit Trust — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-brand-icon">🚌</div>
      <div class="auth-brand-title">Transit Trust</div>
      <div class="auth-brand-sub">Create your passenger account</div>
    </div>

    <!-- Tab Row -->
    <div class="tab-row">
      <a href="/" class="tab-btn">Sign In</a>
      <span class="tab-btn tab-active">Register</span>
    </div>

    <!-- Messages -->
    <div id="register-msg" class="mb-4"></div>

    <!-- Register Form -->
    <form id="register-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="reg-name">FULL NAME</label>
        <input
          id="reg-name"
          type="text"
          placeholder="Your full name"
          class="form-input"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-phone">PHONE NUMBER</label>
        <input
          id="reg-phone"
          type="tel"
          placeholder="01711XXXXXX"
          class="form-input"
          required
        />
        <p class="text-xs text-slate-600 mt-1">11 digits starting with 01 (e.g. 01712345678)</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-gender">GENDER</label>
        <select id="reg-gender" class="form-select" required>
          <option value="">-- Select gender --</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other / Prefer not to say</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">PASSWORD</label>
        <input
          id="reg-password"
          type="password"
          placeholder="Min 6 characters"
          class="form-input"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-confirm">CONFIRM PASSWORD</label>
        <input
          id="reg-confirm"
          type="password"
          placeholder="Re-enter your password"
          class="form-input"
          required
        />
      </div>

      <button type="submit" class="btn-primary w-full mt-2">
        Create Account →
      </button>
    </form>

    <p class="text-center text-xs text-slate-600 mt-5">
      Already have an account?
      <a href="/" class="text-violet-400 hover:text-violet-300 font-semibold">Sign in here</a>
    </p>

  </div>
</div>

<script src="/static/js/db.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
