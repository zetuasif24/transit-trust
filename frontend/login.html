<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transit Trust — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="auth-brand-icon">&#128652;</div>
          <div class="auth-brand-title">Transit Trust</div>
          <div class="auth-brand-sub">
            Public Transport Fare, Safety &amp; Rating System
          </div>
        </div>

        <div class="tab-row">
          <span class="tab-btn tab-active">Sign In</span>
          <a href="/register/" class="tab-btn">Register</a>
        </div>

        <div id="login-msg" class="mb-4"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-phone">PHONE NUMBER</label>
            <input
              id="login-phone"
              type="tel"
              placeholder="01711XXXXXX"
              class="form-input"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">PASSWORD</label>
            <input
              id="login-password"
              type="password"
              placeholder="Your password"
              class="form-input"
              required
            />
          </div>
          <button id="login-btn" type="submit" class="btn-primary w-full mt-2">
            Sign In &rarr;
          </button>
        </form>

        <div class="mt-5">
          <p class="text-center text-xs text-slate-600 mb-2">
            Quick demo logins:
          </p>
          <div class="demo-row">
            <button id="demo-passenger" class="demo-btn">
              &#128100; Passenger<br />
              <span class="font-bold">01711000001 / demo123</span>
            </button>
            <button id="demo-admin" class="demo-btn">
              &#128737; Admin<br />
              <span class="font-bold">01711000002 / admin123</span>
            </button>
          </div>
        </div>

        <p class="text-center text-xs text-slate-600 mt-5">
          Don't have an account?
          <a
            href="/register/"
            class="text-violet-400 hover:text-violet-300 font-semibold"
            >Register here</a
          >
        </p>
      </div>
    </div>
    <script src="/static/js/db.js"></script>
    <script src="/static/js/auth.js"></script>
  </body>
</html>
